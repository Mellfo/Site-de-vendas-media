<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fios de Mell</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #00BCD4;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero-section {
      background: linear-gradient(135deg, #00BCD4 0%, #00ACC1 60%, #0097A7 100%);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      top: -100px;
      right: -100px;
      pointer-events: none;
    }
    .hero-section::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      bottom: -80px;
      left: 40%;
      pointer-events: none;
    }

    /* ── NAVBAR ── */
    .navbar-custom {
      padding: 0px 28px 0px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .brand-name {
      font-size: 1.7rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .nav-link-fios {
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  transition: color 0.2s;
}
.nav-link-fios:hover {
  color: #FFD54F;
}

    /* ── HERO CONTENT ── */
    .hero-content {
      padding: 18px 48px 60px;
    }

    .hero-headline {
      font-size: clamp(2.8rem, 6vw, 4.2rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 30px;
    }

    .hero-sub {
      font-size: 1.8rem;
      color: rgba(255,255,255,0.88);
      line-height: 1.6;
      max-width: 300px;
      font-weight: 400;
    }

    
    
  

    /* ── PRODUCTS AREA ── */
    .products-col {

      padding: 24px 32px 48px;
     
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      padding: 16px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 210px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    .product-card-img-wrap {
      width: 100%;
      height: 170px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-card-img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .ver-detalhes-btn {
      width: 100%;
      background: #FFD54F;
      border: none;
      border-radius: 50px;
      padding: 10px 0;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: #1a1a1a;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .ver-detalhes-btn:hover {
      background: #FFC107;
      transform: scale(1.03);
    }

    /* ── RESPONSIVE: controlado por @media ── */
    @media (max-width: 1024px) and (min-width: 768px) {
      .navbar-custom { padding: 20px 24px 0; }
      .hero-content  { padding: 40px 24px 20px; }
      .hero-headline { font-size: 2.4rem; }
      .products-col  { padding: 24px 24px 40px; display: flex; justify-content: center; gap: 16px; }
      .product-card  { width: 180px; }
      .product-card-img-wrap { height: 160px; }
    }

    @media (max-width: 767px) {
      .navbar-custom { padding: 16px 16px 0; }
      .hero-content  { padding: 32px 16px 20px; }
      .hero-headline { font-size: 2rem; }
      .hero-sub      { font-size: 1.2rem; max-width: 100%; }
      .products-col  { padding: 16px 12px 32px; display: flex; justify-content: center; gap: 12px; }
      .product-card  { width: 145px; }
      .product-card-img-wrap { height: 130px; }
    }
  </style>
</head>
<body>

<section class="hero-section">
  <div class="container-fluid px-0">



    <!-- ── NAVBAR ROW ── -->
<div class="row g-0 navbar-custom align-items-center pb-1">
  <div class="col-12 d-flex align-items-center justify-content-between">
    <div class="logo-wrap">
      <div class="logo-icon">
        <img src="img/novelo.png" alt="Novelo de lã com agulha de crochê">
      </div>
      <span class="brand-name">Fios de Mell</span>
    </div>
    <a href="https://www.instagram.com/fios_demell/" class="nav-link-fios">Contato</a>
  </div>
</div>

    <!-- ── HERO ROW ── -->
    <div class="row g-0 align-items-center">

      <!-- LEFT: texto + CTA -->
      <div class="col-12 col-lg-6 hero-content d-flex flex-column justify-content-start pt-1">
        <h1 class="hero-headline mb-1 mt-0">
          Leve<br/>
          o Brasil<br/>
          para o<br/>
          mundo!
        </h1>
        <p class="hero-sub mb-1">
          Vista nossos fios e mostre<br/>
          de onde viemos.
        </p>
        
      </div>

      <!-- RIGHT: cards dos produtos -->
      <div class="col-12 col-lg-6 products-col">
  <div class="d-flex justify-content-center gap-3 flex-wrap">

    <!-- Card Top -->
    <div>
      <div class="product-card">
        <div class="product-card-img-wrap" style="height: 200px;">
          <img src="img/top.png" alt="Top de crochê"/>
        </div>
        <button class="ver-detalhes-btn" onclick="window.location.href='vendas_media.html'">Ver detalhes</button>
      </div>
    </div>

    <!-- Card Isqueiro -->
    <div>
      <div class="product-card">
        <div class="product-card-img-wrap" style="height: 200px;">
          <img src="img/isqueiro.png" alt="Isqueiro de crochê"/>
        </div>
        <button class="ver-detalhes-btn" onclick="window.location.href='isqueiro_media.html'">Ver detalhes</button>
      </div>
    </div>

  </div>
</div>

      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
